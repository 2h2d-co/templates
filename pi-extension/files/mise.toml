[settings]
lockfile = true
locked = true
minimum_release_age = "7d"

[tools]
node = "22.23.1"
npm = "11.18.0"
actionlint = "1.7.12"
zizmor = "1.26.1"

[env]
_.path = ["{{config_root}}/node_modules/.bin"]

[tasks."lint:actions"]
description = "Lint GitHub Actions workflows with actionlint and zizmor"
run = """
if [ ! -d .github/workflows ]; then
  echo "No .github/workflows directory; skipping GitHub Actions lint."
  exit 0
fi

actionlint
zizmor .github/workflows
"""
