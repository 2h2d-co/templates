name: Stage npm release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: npm-stage-publish
  cancel-in-progress: false

jobs:
  stage:
    name: Stage npm package
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write # Required for npm trusted publishing provenance.
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Set up Node.js and npm
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.14"
          install_args: --locked
          cache: false
      - name: Validate release and derive npm dist-tag
        id: release
        run: node ./scripts/ci-publish-checks.ts
      - name: Install dependencies
        run: npm ci
      - name: Check
        run: npm run check
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
      - name: Stage package on npm
        run: npm stage publish --tag "$NPM_DIST_TAG" --allow-directory=all --provenance
        env:
          NPM_CONFIG_ALLOW_DIRECTORY: all
          NPM_DIST_TAG: "${{ steps.release.outputs.npm_tag }}"
