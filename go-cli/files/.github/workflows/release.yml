name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: go-release
  cancel-in-progress: false

jobs:
  release:
    name: Publish archives
    runs-on: ubuntu-latest
    permissions:
      attestations: write # Required to attest release artifacts.
      contents: write # Required for GoReleaser to create the GitHub release.
      id-token: write # Required for artifact attestation signing.
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install tools
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.6.14"
          install_args: --locked
          cache: false
      - name: Run shared checks
        run: hk check --all --check
      - name: Run GoReleaser
        run: goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Attest release artifacts
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt
